<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fundo TigerTech - Teste 3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Aurora neon nítida - canto superior direito */
    .aurora {
      position: fixed;
      top: -100px;
      right: -100px;
      width: 800px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(
        ellipse 70% 60% at 60% 40%,
        rgba(40, 100, 220, 0.7) 0%,
        rgba(40, 180, 140, 0.5) 20%,
        rgba(180, 200, 60, 0.45) 40%,
        rgba(240, 150, 30, 0.5) 60%,
        rgba(220, 60, 40, 0.4) 75%,
        transparent 95%
      );
      filter: blur(20px);
      z-index: 0;
      pointer-events: none;
    }

    /* Brilho central mais intenso */
    .aurora-core {
      position: fixed;
      top: -50px;
      right: -50px;
      width: 400px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(
        ellipse at center,
        rgba(60, 140, 255, 0.6) 0%,
        rgba(60, 200, 160, 0.3) 25%,
        rgba(200, 200, 70, 0.2) 50%,
        transparent 80%
      );
      filter: blur(8px);
      z-index: 0;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 2;
      color: white;
      text-align: center;
      padding: 2rem;
    }

    .logo-text {
      font-size: 4.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }

    .logo-text .tiger { color: #FF7A00; }
    .logo-text .tech { color: #FFFFFF; }

    .divider {
      width: 60px;
      height: 2px;
      background: rgba(255,255,255,0.3);
      margin: 1rem auto;
    }

    .slogan {
      font-size: 1.2rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
    }

    .tagline {
      font-size: 0.85rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.4);
      margin-top: 2rem;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <div class="aurora-core"></div>

  <div class="content">
    <div class="logo-text">
      <span class="tiger">Tiger</span><span class="tech">Tech</span>
    </div>
    <div class="divider"></div>
    <div class="slogan">Instinto Digital</div>
    <div class="tagline">Suporte & Automação</div>
  </div>
</body>
</html>
